<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmos</title>
    <link rel="icon" href="../images/favicon.ico" />
    <link rel="stylesheet" href="./output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body>
    <!-- header -->
    <header class="py-8 fixed shadow-md w-full z-50 bg-deep-space">
      <div class="container">
        <!-- wrapper -->
        <div class="flex justify-between items-center">
          <!-- logo -->
          <h4 class="logo">
            <span class="logo-icon">🚀</span>
            COSMOS
          </h4>
          <!-- nav -->
          <nav class="headerNav">
            <ul>
              <li><a href="./home.html">Home</a></li>
              <li><a href="./missions.html">Missions</a></li>
              <li><a href="./spacecraft.html">Spacecraft</a></li>
              <li><a href="./gallery.html">Gallery</a></li>
              <li><a href="./contact.html">Contact</a></li>
            </ul>
          </nav>
          <!-- toggle menu -->
          <div class="toggleMenu">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <!-- transparent -->
          <div class="transparent"></div>
        </div>
      </div>
    </header>

    <!-- hero -->
    <section
      class="pt-40 pb-24 min-h-screen parallax-bg"
      style="background-image: url(&quot;/images/bg.png&quot;)"
    >
      <div class="container relative z-10">
        <div class="text-center mb-16 px-4">
          <h1
            class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-6 tracking-tight"
          >
            Cosmic Gallery
          </h1>
          <p
            class="text-white/60 text-[15px] md:text-base max-w-2xl mx-auto leading-relaxed"
          >
            Breathtaking images from across the universe captured by our
            missions and observatories.
          </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">
          <div
            class="md:col-span-2 md:row-span-2 h-[300px] md:h-[504px] rounded-xl overflow-hidden group cursor-pointer border border-white/5 shadow-lg"
          >
            <img
              src="../images/9.jfif"
              alt="Nebula Cloud"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>

          <div
            class="md:col-span-1 md:row-span-1 h-[300px] md:h-[240px] rounded-xl overflow-hidden group cursor-pointer border border-white/5 shadow-lg"
          >
            <img
              src="../images/8.jpg"
              alt="Space Station Cupola"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>

          <div
            class="md:col-span-1 md:row-span-1 h-[300px] md:h-[240px] rounded-xl overflow-hidden group cursor-pointer border border-white/5 shadow-lg"
          >
            <img
              src="../images/7.jpg"
              alt="Abstract Mars Texture"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>

          <div
            class="md:col-span-2 md:row-span-1 h-[300px] md:h-[240px] rounded-xl overflow-hidden group cursor-pointer border border-white/5 shadow-lg"
          >
            <img
              src="../images/9.jfif"
              alt="Wide Nebula View"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>

          <div
            class="md:col-span-1 md:row-span-2 h-[300px] md:h-[504px] rounded-xl overflow-hidden group cursor-pointer border border-white/5 shadow-lg"
          >
            <img
              src="../images/10.jfif"
              alt="Milky Way Galaxy"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>

          <div
            class="md:col-span-1 md:row-span-1 h-[300px] md:h-[240px] rounded-xl overflow-hidden group cursor-pointer border border-white/5 shadow-lg"
          >
            <img
              src="../images/11.jfif"
              alt="Starfield"
              class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>
        </div>
      </div>
    </section>

    <!-- footer -->
    <footer>
      <div class="border-y border-text-secondary/10 py-8">
        <div class="container">
          <div
            class="flex flex-col md:flex-row items-center justify-between gap-8"
          >
            <div class="font-space"><h4>🚀 COSMOS</h4></div>

            <div>
              <ul class="flex gap-8 text-text-secondary">
                <li><a href="./home.html">Home</a></li>
                <li><a href="./missions.html">Missions</a></li>
                <li><a href="./spacecraft.html">Spacecraft</a></li>
                <li><a href="./gallery.html">Gallery</a></li>
              </ul>
            </div>

            <div class="flex gap-4">
              <a class="social-icon">
                <i class="fa-brands fa-x-twitter"></i>
              </a>

              <a class="social-icon">
                <i class="fa-brands fa-linkedin-in"></i>
              </a>

              <a class="social-icon">
                <i class="fa-solid fa-camera"></i>
              </a>

              <a class="social-icon">
                <i class="fa-brands fa-youtube"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="container">
        <p class="text-center text-text-secondary text-sm my-12">
          © 2026 Cosmos Space Exploration. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="../js/toggle-menu.js"></script>
  </body>
</html>
