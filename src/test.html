  <body>
    <!-- header -->
    <header class="py-8 fixed shadow-md w-full z-50 bg-deep-space">
      <div class="container">

        <div class="flex justify-between items-center">

          <h4 class="logo text-3xl">
            <span class="logo-icon">🚀</span>

            <span></span>

    <section

      style="background-image: url(&quot;/images/bg.png&quot;)"

          <h2>Cosmic Gallery</h2>
          <p class="md:w-140 w-90">

        <div class="gallery-grid">

            <img src="../images/9.jfif" alt="" />

            <img src="../images/8.jpg" alt="" />

          <div class="gallery-item item-3">
            <img src="../images/7.jpg" alt="" />
          </div>

          <div class="gallery-item item-4">
            <img src="../images/9.jfif" alt="" />

          <div class="gallery-item item-5">
            <img src="../images/10.jfif" alt="" />
          </div>

          <div class="gallery-item item-6">
            <img src="../images/11.jfif" alt="" />
          </div>
        </div>
      </div>

        <div class="container">
          <div

              <a class="social-icon">
